<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ARTS - Akıllı Rekabet Takip Sistemi</title>
  <style>
    :root{--g:#2E7D32;--g2:#1B5E20;--soft:#E8F5E9;--red:#C62828;--text:#263238;--muted:#607D8B;--bg:#F6F8F7}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(135deg,var(--g2),var(--g));color:white;padding:30px 36px}
    .brand{font-size:44px;font-weight:800;letter-spacing:2px}.sub{font-size:18px;opacity:.95}
    main{padding:24px 34px;max-width:1280px;margin:auto}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
    .card{background:white;border-radius:16px;padding:16px;box-shadow:0 4px 18px #0001;border-left:6px solid var(--g)}
    .num{font-size:26px;font-weight:800;color:var(--g)}.label{color:var(--muted);font-size:13px;margin-top:4px}
    button{background:var(--g);color:white;border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer}
    button:disabled{opacity:.6;cursor:wait}.muted{color:var(--muted)}
    table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden;box-shadow:0 4px 18px #0001}
    th{background:var(--g);color:white;text-align:left;padding:12px;font-size:13px}
    td{padding:11px;border-bottom:1px solid #eee;font-size:13px;vertical-align:top}
    .badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:700}
    .green{background:var(--soft);color:var(--g2)}.amber{background:#FFF8E1;color:#8A6D00}.red{background:#FFEBEE;color:var(--red)}
    .small{font-size:12px;color:var(--muted)}.topline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    @media(max-width:950px){.cards{grid-template-columns:1fr}main{padding:18px} table{font-size:12px}}
  </style>
</head>
<body>
<header>
  <div class="brand">ARTS</div>
  <div class="sub">Akıllı Rekabet Takip Sistemi • Web Pilot</div>
</header>

<main>
  <h2>Sakarya / Adapazarı Rakip Fiyat Kontrolü</h2>
  <p class="muted">17 hedef ürün, seçili rakip marketler ve en düşük fiyat kontrolü.</p>

  <div class="topline">
    <button id="btn" onclick="run()">Canlı Kontrolü Çalıştır</button>
    <span id="status" class="muted"></span>
  </div>

  <div class="cards">
    <div class="card"><div class="num">17</div><div class="label">Takip edilen ürün</div></div>
    <div class="card"><div class="num">8+</div><div class="label">Rakip market filtresi</div></div>
    <div class="card"><div class="num" id="foundCount">0</div><div class="label">Bulunan ürün</div></div>
    <div class="card"><div class="num" id="depotCount">-</div><div class="label">Yakındaki şube/depo</div></div>
  </div>

  <table>
    <thead>
      <tr><th>Hedef Ürün</th><th>En Ucuz Bulunan Sonuç</th><th>Market</th><th>Fiyat</th><th>Durum</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<script>
function tl(n){ if(n===null||n===undefined) return "-"; return Number(n).toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" TL"; }
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}

async function run(){
  const btn=document.getElementById("btn");
  const status=document.getElementById("status");
  btn.disabled=true; status.textContent=" Kontrol ediliyor... 17 ürün birkaç dakika sürebilir.";
  try{
    const res=await fetch("/api/run");
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||"Bilinmeyen hata");
    render(data); status.textContent=" Tamamlandı. Son kontrol: " + data.checkedAt;
  }catch(e){
    status.innerHTML='<span class="badge red">Hata: '+esc(e.message)+'</span>';
  }finally{btn.disabled=false}
}

function render(data){
  document.getElementById("depotCount").textContent=data.depotCount||0;
  const tb=document.getElementById("tbody"); tb.innerHTML="";
  let found=0;
  for(const item of data.results){
    const b=item.best;
    if(b) found++;
    let status='<span class="badge green">Bulundu</span>';
    if(item.status==="not_found") status='<span class="badge amber">Sonuç bulunamadı</span>';
    if(item.status==="error") status='<span class="badge red">Hata</span>';
    tb.innerHTML += `<tr>
      <td><b>${esc(item.target)}</b><br><span class="small">${esc(item.keyword)}</span></td>
      <td>${b?esc(b.title)+"<br><span class='small'>"+esc(b.brand)+" "+esc(b.quantity)+"</span>":esc(item.error||"-")}</td>
      <td>${b?esc(b.market):"-"}</td>
      <td><b>${b?tl(b.price):"-"}</b></td>
      <td>${status}</td>
    </tr>`;
  }
  document.getElementById("foundCount").textContent=found;
}
</script>
</body>
</html>
